<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Flower stem -->
  <path d="M150 250 Q150 200 150 150" fill="none" stroke="#333" stroke-width="3"/>
  
  <!-- Leaves -->
  <path d="M150 200 Q100 220 80 200" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M150 180 Q200 200 220 180" fill="none" stroke="#333" stroke-width="2"/>
  
  <!-- Petals (simple circles) -->
  <circle cx="150" cy="120" r="20" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="180" cy="135" r="20" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="180" cy="105" r="20" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="120" cy="135" r="20" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="120" cy="105" r="20" fill="none" stroke="#333" stroke-width="3"/>
  
  <!-- Center of flower -->
  <circle cx="150" cy="120" r="15" fill="none" stroke="#333" stroke-width="3"/>
  
  <!-- Petal details -->
  <path d="M150 100 L150 80" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M150 140 L150 160" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M130 120 L110 120" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M170 120 L190 120" fill="none" stroke="#333" stroke-width="2"/>
</svg>
