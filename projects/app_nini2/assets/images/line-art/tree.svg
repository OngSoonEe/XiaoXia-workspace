<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Tree trunk -->
  <rect x="140" y="150" width="20" height="100" fill="none" stroke="#333" stroke-width="4"/>
  
  <!-- Tree branches -->
  <path d="M150 200 L100 180 L80 160" fill="none" stroke="#333" stroke-width="3"/>
  <path d="M150 210 L200 190 L220 170" fill="none" stroke="#333" stroke-width="3"/>
  <path d="M150 180 L120 150" fill="none" stroke="#333" stroke-width="3"/>
  <path d="M150 190 L180 160" fill="none" stroke="#333" stroke-width="3"/>
  
  <!-- Tree leaves (simple circles) -->
  <circle cx="150" cy="120" r="60" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="120" cy="140" r="40" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="180" cy="140" r="40" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="150" cy="100" r="50" fill="none" stroke="#333" stroke-width="3"/>
  
  <!-- Ground -->
  <path d="M100 250 Q150 230 200 250" fill="none" stroke="#333" stroke-width="3"/>
</svg>
